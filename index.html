<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ДР</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Bebas+Neue&family=Share+Tech+Mono&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #8b0000;
    --deep-red: #4a0000;
    --bright-red: #cc0000;
    --blue: #00b8ff;
    --blue-glow: #00d4ff;
    --white: #ffffff;
    --black: #000000;
    --dark: #0a0000;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--dark);
    font-family: 'Rajdhani', 'Share Tech Mono', sans-serif;
    cursor: default;
    user-select: none;
  }

  /* ── CANVAS LAYER ── */
  #bg-canvas {
    position: fixed; inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* ── SCANLINES ── */
  .scanlines {
    position: fixed; inset: 0; z-index: 50;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      transparent, transparent 2px,
      rgba(0,0,0,0.18) 2px, rgba(0,0,0,0.18) 4px
    );
    animation: scanMove 8s linear infinite;
  }
  @keyframes scanMove {
    0% { background-position: 0 0; }
    100% { background-position: 0 100px; }
  }

  /* ── CRT VIGNETTE ── */
  .vignette {
    position: fixed; inset: 0; z-index: 49; pointer-events: none;
    background: radial-gradient(ellipse at center,
      transparent 55%,
      rgba(0,0,0,0.6) 100%
    );
  }

  /* ── FILM GRAIN ── */
  .grain {
    position: fixed; inset: 0; z-index: 48; pointer-events: none;
    opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
    animation: grainAnim 0.5s steps(1) infinite;
  }
  @keyframes grainAnim {
    0%,100% { transform: translate(0,0); }
    20% { transform: translate(-2px,2px); }
    40% { transform: translate(2px,-2px); }
    60% { transform: translate(-1px,1px); }
    80% { transform: translate(1px,-1px); }
  }

  /* ── MAIN CONTAINER ── */
  #app {
    position: relative; z-index: 10;
    width: 100vw; height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: clamp(32px, 6vh, 56px);
  }

  /* ── DIAMOND ACCENT ── */
  .diamond-accent {
    display: flex; align-items: center; gap: 12px;
    opacity: 0.7;
  }
  .diamond-accent::before, .diamond-accent::after {
    content: '◆';
    color: var(--blue);
    font-size: 10px;
    animation: diamondPulse 2s ease-in-out infinite;
  }
  .diamond-accent::after { animation-delay: 0.5s; }
  @keyframes diamondPulse {
    0%,100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.3); }
  }
  .diamond-accent span {
    color: var(--blue);
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(10px, 2vw, 13px);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    animation: diamondPulse 2s ease-in-out infinite 0.25s;
  }

  /* ── MAIN TITLE ── */
  #main-title {
    text-align: center;
    padding: 0 20px;
    position: relative;
  }
  #title-text {
    display: block;
    font-family: 'Bebas Neue', 'Rajdhani', sans-serif;
    font-size: clamp(28px, 7vw, 80px);
    font-weight: 400;
    color: var(--white);
    letter-spacing: 0.05em;
    line-height: 1.1;
    text-shadow:
      0 0 10px rgba(0,184,255,0.8),
      0 0 30px rgba(0,184,255,0.5),
      0 0 60px rgba(0,184,255,0.3),
      0 0 100px rgba(0,184,255,0.15);
    animation: titleFlicker 4s ease-in-out infinite;
    transition: all 0.6s cubic-bezier(0.4,0,0.2,1);
    position: relative;
  }
  #title-text.changing {
    animation: glitchOut 0.4s forwards;
  }
  #title-text.phase2 {
    font-size: clamp(24px, 5.5vw, 60px);
    color: var(--blue-glow);
    text-shadow:
      0 0 10px rgba(0,184,255,1),
      0 0 30px rgba(0,184,255,0.8),
      0 0 60px rgba(0,184,255,0.5),
      0 0 100px rgba(0,184,255,0.3);
    animation: titleFlicker2 2s ease-in-out infinite;
  }
  @keyframes titleFlicker {
    0%,92%,100% { opacity: 1; }
    93% { opacity: 0.8; }
    94% { opacity: 1; }
    96% { opacity: 0.7; }
    97% { opacity: 1; }
  }
  @keyframes titleFlicker2 {
    0%,100% { opacity: 1; }
    50% { opacity: 0.9; text-shadow: 0 0 20px rgba(0,184,255,1), 0 0 40px rgba(0,184,255,0.9), 0 0 80px rgba(0,184,255,0.6); }
  }
  @keyframes glitchOut {
    0% { opacity: 1; transform: translateX(0); clip-path: inset(0 0 0 0); }
    20% { transform: translateX(-4px) skewX(-2deg); clip-path: inset(20% 0 30% 0); color: #ff0033; }
    40% { transform: translateX(4px) skewX(2deg); clip-path: inset(50% 0 10% 0); color: var(--blue); }
    60% { transform: translateX(-2px); clip-path: inset(0 0 80% 0); }
    80% { opacity: 0; transform: translateX(8px) skewX(-5deg); }
    100% { opacity: 0; }
  }
  .title-underline {
    display: block;
    width: 60%;
    height: 2px;
    margin: 10px auto 0;
    background: linear-gradient(90deg, transparent, var(--blue), transparent);
    animation: underlinePulse 3s ease-in-out infinite;
  }
  @keyframes underlinePulse {
    0%,100% { width: 40%; opacity: 0.6; }
    50% { width: 80%; opacity: 1; }
  }

  /* ── BUTTONS ROW ── */
  #buttons-row {
    display: flex;
    gap: clamp(20px, 5vw, 60px);
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    transition: all 0.3s;
  }

  /* ── BASE BUTTON ── */
  .p5-btn {
    position: relative;
    font-family: 'Bebas Neue', 'Rajdhani', sans-serif;
    font-size: clamp(22px, 5vw, 52px);
    letter-spacing: 0.12em;
    padding: clamp(12px,2.5vw,18px) clamp(36px,7vw,72px);
    border: none;
    cursor: pointer;
    overflow: visible;
    clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
    transition: transform 0.12s, box-shadow 0.2s;
    outline: none;
    -webkit-tap-highlight-color: transparent;
  }
  .p5-btn::before {
    content: '';
    position: absolute; inset: -2px;
    clip-path: inherit;
    z-index: -1;
    transition: opacity 0.2s;
  }
  .p5-btn::after {
    content: attr(data-text);
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    clip-path: inherit;
    font-family: inherit; font-size: inherit; letter-spacing: inherit;
    opacity: 0;
    transition: opacity 0.1s;
    pointer-events: none;
  }

  /* ── YES BUTTON ── */
  #btn-yes {
    background: linear-gradient(135deg, #003a5c 0%, #005a8a 50%, #0077b6 100%);
    color: var(--white);
    box-shadow: 0 0 20px rgba(0,184,255,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
  }
  #btn-yes::before { background: var(--blue); opacity: 0.15; }
  #btn-yes::after { color: #ff003c; background: #000; }
  #btn-yes:hover {
    transform: scale(1.07);
    box-shadow: 0 0 40px rgba(0,184,255,0.9), 0 0 80px rgba(0,184,255,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
    animation: btnGlitch 0.3s steps(2) 1;
  }
  #btn-yes:active { transform: scale(0.97); }

  /* ── NO BUTTON ── */
  #btn-no {
    position: fixed;
    background: linear-gradient(135deg, #1a0000 0%, #3d0000 50%, #5c0000 100%);
    color: #ff6666;
    box-shadow: 0 0 20px rgba(200,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
    transition: transform 0.12s, box-shadow 0.2s, left 0.0s, top 0.0s;
    z-index: 20;
  }
  #btn-no::before { background: #ff0000; opacity: 0.1; }
  #btn-no:hover {
    box-shadow: 0 0 30px rgba(255,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
    animation: btnShake 0.3s ease-in-out;
  }
  #btn-no.running {
    transition: transform 0.12s, box-shadow 0.2s;
  }

  @keyframes btnShake {
    0%,100% { transform: translateX(0) rotate(0deg); }
    20% { transform: translateX(-3px) rotate(-1deg); }
    40% { transform: translateX(3px) rotate(1deg); }
    60% { transform: translateX(-2px) rotate(0deg); }
    80% { transform: translateX(2px) rotate(-0.5deg); }
  }
  @keyframes btnGlitch {
    0% { clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%); transform: scale(1.07) translateX(0); }
    25% { clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 60%, 0% 60%); transform: scale(1.07) translateX(-3px); filter: hue-rotate(90deg); }
    50% { clip-path: polygon(12px 40%, 100% 40%, calc(100% - 12px) 100%, 0% 100%); transform: scale(1.07) translateX(3px); }
    75% { clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%); transform: scale(1.07) translateX(-1px); }
    100% { clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%); transform: scale(1.07) translateX(0); }
  }

  /* ── CORNER LABELS ── */
  .corner-text {
    position: fixed;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: rgba(0,184,255,0.4);
    letter-spacing: 0.15em;
    pointer-events: none;
    z-index: 30;
  }
  #corner-tl { top: 18px; left: 20px; }
  #corner-tr { top: 18px; right: 20px; text-align: right; }
  #corner-bl { bottom: 18px; left: 20px; }
  #corner-br { bottom: 18px; right: 20px; text-align: right; }

  /* ── "ЭЙ..." HINT ── */
  #hey-hint {
    position: fixed;
    bottom: 60px; left: 30px;
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(13px,2.5vw,18px);
    color: var(--blue);
    opacity: 0;
    pointer-events: none;
    z-index: 40;
    text-shadow: 0 0 10px var(--blue);
    transition: opacity 0.5s;
    letter-spacing: 0.1em;
  }
  #hey-hint.visible { opacity: 1; animation: heyFloat 2s ease-in-out infinite; }
  @keyframes heyFloat {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  /* ── NO SPLIT EFFECT ── */
  #btn-no-top, #btn-no-bottom {
    position: fixed;
    display: none;
    font-family: 'Bebas Neue', 'Rajdhani', sans-serif;
    font-size: clamp(22px,5vw,52px);
    letter-spacing: 0.12em;
    padding: clamp(6px,1.25vw,9px) clamp(36px,7vw,72px);
    z-index: 20;
    pointer-events: none;
    overflow: hidden;
  }
  #btn-no-top {
    background: linear-gradient(135deg, #1a0000, #5c0000);
    color: #ff6666;
    clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
    clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
  }
  #btn-no-bottom {
    background: linear-gradient(135deg, #3d0000, #1a0000);
    color: #cc4444;
    clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
  }

  /* ── FLASH OVERLAY ── */
  #flash {
    position: fixed; inset: 0; z-index: 100;
    background: var(--blue);
    opacity: 0; pointer-events: none;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 20px;
  }
  #flash.active { animation: flashAnim 1.8s forwards; }
  @keyframes flashAnim {
    0% { opacity: 0; }
    10% { opacity: 0.95; }
    30% { opacity: 0.7; }
    50% { opacity: 0.9; }
    70% { opacity: 0.5; }
    85% { opacity: 0.8; }
    100% { opacity: 1; }
  }
  #flash-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(40px,10vw,100px);
    color: white;
    letter-spacing: 0.1em;
    text-shadow: 0 0 30px rgba(255,255,255,0.8);
    animation: none;
  }
  #flash.active #flash-text { animation: flashTextGlitch 1.8s forwards; }
  @keyframes flashTextGlitch {
    0% { opacity: 0; transform: scaleX(0.5); }
    15% { opacity: 1; transform: scaleX(1.05); }
    30% { transform: scaleX(0.98) translateX(-3px); filter: hue-rotate(30deg); }
    50% { transform: scaleX(1) translateX(0); }
    70% { transform: skewX(-3deg); }
    100% { opacity: 1; transform: none; }
  }
  #flash-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(12px,2.5vw,18px);
    color: rgba(255,255,255,0.7);
    letter-spacing: 0.3em;
    text-transform: uppercase;
  }

  /* ── PARTICLES container ── */
  #particles {
    position: fixed; inset: 0; z-index: 5; pointer-events: none;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    width: 2px; height: 2px;
    background: var(--blue);
    border-radius: 50%;
    box-shadow: 0 0 4px var(--blue), 0 0 8px var(--blue);
    animation: particleFloat linear infinite;
    opacity: 0;
  }
  @keyframes particleFloat {
    0% { transform: translateY(100vh) translateX(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 0.8; }
    100% { transform: translateY(-50px) translateX(calc(var(--drift) * 80px)); opacity: 0; }
  }

  /* ── SPLIT ANIMATION ── */
  @keyframes splitTop {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    30% { transform: translateY(-20px) rotate(-8deg) translateX(-30px); }
    50% { transform: translateY(-80px) rotate(-20deg) translateX(-60px) scaleX(1.2); filter: hue-rotate(60deg) brightness(2); }
    100% { transform: translateY(-200px) rotate(-35deg) translateX(-100px); opacity: 0; }
  }
  @keyframes splitBottom {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    30% { transform: translateY(20px) rotate(8deg) translateX(30px); }
    50% { transform: translateY(80px) rotate(20deg) translateX(60px) scaleX(1.2); filter: hue-rotate(60deg) brightness(2); }
    100% { transform: translateY(200px) rotate(35deg) translateX(100px); opacity: 0; }
  }
  #btn-no-top.splitting { display: block; animation: splitTop 0.8s cubic-bezier(0.4,0,0.2,1) forwards; }
  #btn-no-bottom.splitting { display: block; animation: splitBottom 0.8s cubic-bezier(0.4,0,0.2,1) forwards; }

  /* ── PHASE 2 YES BUTTON ── */
  #btn-yes.phase2 {
    background: linear-gradient(135deg, #004a00 0%, #006600 50%, #008800 100%);
    box-shadow: 0 0 20px rgba(0,255,80,0.4), 0 0 50px rgba(0,255,80,0.2);
    color: #aaffaa;
    clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
  }
  #btn-yes.phase2:hover {
    box-shadow: 0 0 40px rgba(0,255,80,0.9), 0 0 80px rgba(0,255,80,0.4);
  }

  /* ── MOBILE ── */
  @media (max-width: 500px) {
    #buttons-row { gap: 14px; }
    .p5-btn { clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%); }
  }
</style>
</head>
<body>

<!-- Background canvas -->
<canvas id="bg-canvas"></canvas>

<!-- Atmosphere -->
<div class="scanlines"></div>
<div class="vignette"></div>
<div class="grain"></div>
<div id="particles"></div>

<!-- Corner HUD -->
<div class="corner-text" id="corner-tl">SYS::ACTIVE<br>MEM:∞</div>
<div class="corner-text" id="corner-tr">PЯ.EXE<br>VER:2.0</div>
<div class="corner-text" id="corner-bl">© PHANTOM THIEVES</div>
<div class="corner-text" id="corner-br">METAVERSE:ONLINE</div>

<!-- "Эй..." hint -->
<div id="hey-hint">Ой...</div>

<!-- Main app -->
<div id="app">
  <div class="diamond-accent"><span>ВНИМАНИЕ · ВАЖНОЕ СООБЩЕНИЕ · ВНИМАНИЕ</span></div>

  <div id="main-title">
    <span id="title-text">НЕ ОПРЕДЕЛИСЬ С ПОДАРОКОМ?</span>
    <span class="title-underline"></span>
  </div>

  <div id="buttons-row">
    <button class="p5-btn" id="btn-yes" data-text="ДА">ДА</button>
    <button class="p5-btn" id="btn-no" data-text="НЕТ">НЕТ</button>
  </div>
</div>

<!-- Split halves (hidden initially) -->
<div id="btn-no-top">НЕТ</div>
<div id="btn-no-bottom">НЕТ</div>

<!-- Flash transition overlay -->
<div id="flash">
  <div id="flash-text">СПАСИБО)))))</div>
  <div id="flash-sub">Переход к подарку...</div>
</div>

<script>
  /* ═══════════════════════════════════════════
     BACKGROUND CANVAS — waves + particles glow
  ═══════════════════════════════════════════ */
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, t = 0;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function drawBg() {
    // Deep red base
    const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.8);
    grad.addColorStop(0, '#3a0000');
    grad.addColorStop(0.5, '#200000');
    grad.addColorStop(1, '#050000');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Animated waves
    const waveCount = 5;
    for (let wi = 0; wi < waveCount; wi++) {
      ctx.beginPath();
      ctx.strokeStyle = `rgba(${80 + wi*15},0,0,${0.15 - wi*0.02})`;
      ctx.lineWidth = 1.5;
      const freq = 0.003 + wi * 0.001;
      const amp  = 30  + wi * 15;
      const spd  = 0.3 + wi * 0.15;
      const yOff = H * (0.2 + wi * 0.15);
      ctx.moveTo(0, yOff);
      for (let x = 0; x <= W; x += 3) {
        const y = yOff + Math.sin(x * freq + t * spd + wi) * amp
                       + Math.sin(x * freq * 1.7 - t * spd * 0.6) * (amp * 0.4);
        ctx.lineTo(x, y);
      }
      ctx.stroke();
    }

    // Subtle blue glow lines
    for (let li = 0; li < 2; li++) {
      ctx.beginPath();
      ctx.strokeStyle = `rgba(0,${100+li*80},${200+li*55},${0.04 + Math.sin(t*0.5+li)*0.02})`;
      ctx.lineWidth = 2;
      const yB = H * (0.45 + li * 0.1) + Math.sin(t * 0.2 + li * 3) * 60;
      ctx.moveTo(0, yB);
      for (let x = 0; x <= W; x += 4) {
        const y = yB + Math.sin(x * 0.004 + t * 0.4 + li * 2) * 20;
        ctx.lineTo(x, y);
      }
      ctx.stroke();
    }

    t += 0.015;
    requestAnimationFrame(drawBg);
  }
  drawBg();

  /* ═══════════════════════════════════════════
     FLOATING PARTICLES
  ═══════════════════════════════════════════ */
  const particlesEl = document.getElementById('particles');
  function spawnParticle() {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 3 + 1;
    p.style.cssText = `
      left: ${Math.random() * 100}%;
      bottom: -10px;
      width: ${size}px;
      height: ${size}px;
      --drift: ${(Math.random()-0.5)*2};
      animation-duration: ${4 + Math.random()*6}s;
      animation-delay: ${Math.random()*2}s;
      opacity: 0;
    `;
    particlesEl.appendChild(p);
    setTimeout(() => p.remove(), 12000);
  }
  setInterval(spawnParticle, 300);

  /* ═══════════════════════════════════════════
     BUTTON LOGIC
  ═══════════════════════════════════════════ */
  const btnYes   = document.getElementById('btn-yes');
  const btnNo    = document.getElementById('btn-no');
  const titleEl  = document.getElementById('title-text');
  const heyHint  = document.getElementById('hey-hint');
  const noTop    = document.getElementById('btn-no-top');
  const noBottom = document.getElementById('btn-no-bottom');
  const flash    = document.getElementById('flash');

  let phase = 1;      // 1 = initial, 2 = after YES
  let noEscapes = 0;  // count NO button escapes
  let noAlive = true;

  // Position NO button initially in natural flow
  function positionNoBtnInitial() {
    const yesRect = btnYes.getBoundingClientRect();
    btnNo.style.left = (yesRect.right + 40) + 'px';
    btnNo.style.top  = yesRect.top + 'px';
    btnNo.style.transform = 'none';
  }

  window.addEventListener('load', positionNoBtnInitial);
  window.addEventListener('resize', () => { if (phase === 1 && noEscapes === 0) positionNoBtnInitial(); });

  /* NO — escape on click */
  function escapeNo(e) {
    if (!noAlive) return;
    e.stopPropagation();

    noEscapes++;
    if (noEscapes === 1) {
      heyHint.classList.add('visible');
    }

    const bw = btnNo.offsetWidth;
    const bh = btnNo.offsetHeight;
    const margin = 20;
    const maxX = window.innerWidth  - bw - margin;
    const maxY = window.innerHeight - bh - margin;
    const newX = margin + Math.random() * maxX;
    const newY = margin + Math.random() * maxY;

    // Glitch flash
    btnNo.style.filter = 'brightness(2) hue-rotate(90deg)';
    setTimeout(() => { btnNo.style.filter = ''; }, 150);

    btnNo.style.transition = 'left 0s, top 0s, filter 0.15s';
    btnNo.style.left = newX + 'px';
    btnNo.style.top  = newY + 'px';
  }

  btnNo.addEventListener('click', escapeNo);
  btnNo.addEventListener('touchstart', escapeNo, { passive: false });

  /* NO — hover shake */
  btnNo.addEventListener('mouseenter', () => {
    if (!noAlive) return;
    btnNo.style.animation = 'btnShake 0.3s ease-in-out';
    btnNo.addEventListener('animationend', () => { btnNo.style.animation = ''; }, { once: true });
  });

  /* YES */
  btnYes.addEventListener('click', handleYes);
  btnYes.addEventListener('touchstart', (e) => { e.preventDefault(); handleYes(); }, { passive: false });

  function handleYes() {
    if (phase === 1) {
      phase = 2;

      // Title glitch out → change text
      titleEl.classList.add('changing');
      setTimeout(() => {
        titleEl.textContent = 'ЗАМЕЧАТЕЛЬНО';
        titleEl.classList.remove('changing');
        titleEl.classList.add('phase2');
        // re-add underline
        const u = document.querySelector('.title-underline');
        if (u) u.style.background = 'linear-gradient(90deg,transparent,#00b8ff,transparent)';
      }, 420);

      // Destroy NO button with split
      if (noAlive) {
        noAlive = false;
        heyHint.classList.remove('visible');
        splitNoBurton();
      }

      // YES becomes ЗАБРАТЬ ПОДАРОК
      setTimeout(() => {
        btnYes.textContent = 'ЕСЛИ НЕЗАТРУДНИТЕЛЬНО~~~~';
        btnYes.classList.add('phase2');
        // spawn extra particles burst
        for (let i = 0; i < 20; i++) spawnParticle();
      }, 600);

    } else if (phase === 2) {
      // Flash and redirect
      flash.classList.add('active');
      setTimeout(() => {
        window.location.href = 'https://l.kaspi.kz/shop/EXxCobWhAZKmwmv?sessionId=41badd72-a14c-4f3a-a817-8e31e007dc4e1781688414';
      }, 2000);
    }
  }

  function splitNoBurton() {
    const rect = btnNo.getBoundingClientRect();
    const cx   = rect.left;
    const cy   = rect.top;
    const w    = rect.width;
    const h    = rect.height;
    const half = h / 2;

    // Position the two halves over the original
    noTop.style.cssText = `
      display: block;
      left: ${cx}px; top: ${cy}px;
      width: ${w}px; height: ${half}px;
      overflow: hidden;
    `;
    noBottom.style.cssText = `
      display: block;
      left: ${cx}px; top: ${cy + half}px;
      width: ${w}px; height: ${half}px;
      overflow: hidden;
    `;

    // Hide original
    btnNo.style.opacity = '0';
    btnNo.style.pointerEvents = 'none';

    // Trigger split CSS animations
    requestAnimationFrame(() => {
      noTop.classList.add('splitting');
      noBottom.classList.add('splitting');
    });

    // Clean up
    setTimeout(() => {
      noTop.style.display = 'none';
      noBottom.style.display = 'none';
    }, 900);
  }

  /* ═══════════════════════════════════════════
     CORNER HUD live counter
  ═══════════════════════════════════════════ */
  const cornerBL = document.getElementById('corner-bl');
  setInterval(() => {
    const n = Math.floor(Math.random() * 9999).toString().padStart(4,'0');
    cornerBL.textContent = `© PHANTOM THIEVES :: ${n}`;
  }, 2000);
</script>
</body>
</html>
