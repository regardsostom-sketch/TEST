<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Определись с подарком</title>
<style>
  :root {
    --bg-1: #ffffff;
    --bg-2: #f3eefc;
    --lavender: #c9b6f0;
    --lavender-deep: #9b7fd4;
    --ink: #4a4256;
    --ink-soft: #8b81a0;
    --iron: #6f6580;
  }

  * {
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
    margin: 0;
    overflow: hidden;
  }

  body {
    font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    background: radial-gradient(circle at 50% 30%, var(--bg-1) 0%, var(--bg-2) 55%, #ece2fb 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .scene {
    width: 100%;
    height: 100%;
    position: relative;
  }

  .center-stage {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 48px;
    width: min(90vw, 520px);
  }

  h1 {
    font-family: Georgia, "Times New Roman", serif;
    font-weight: 400;
    font-size: clamp(28px, 5vw, 42px);
    color: var(--ink);
    letter-spacing: 0.5px;
    margin: 0;
    line-height: 1.3;
  }

  .subtitle {
    margin-top: -32px;
    font-size: 14px;
    color: var(--ink-soft);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    opacity: 0;
    max-height: 0;
    transition: opacity 0.6s ease, margin-top 0.6s ease;
  }

  .subtitle.show {
    opacity: 1;
    margin-top: 0;
  }

  .subtitle .iron-word {
    color: var(--lavender-deep);
    font-weight: 600;
  }

  .buttons {
    display: flex;
    gap: 24px;
    position: relative;
    height: 56px;
    align-items: center;
  }

  button {
    font-family: inherit;
    font-size: 16px;
    letter-spacing: 0.5px;
    padding: 14px 38px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  #btn-no {
    background: #ffffff;
    color: var(--ink);
    border: 1.5px solid var(--lavender);
    box-shadow: 0 2px 10px rgba(155, 127, 212, 0.15);
  }

  #btn-no:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(155, 127, 212, 0.25);
  }

  #btn-yes {
    background: linear-gradient(135deg, var(--lavender), var(--lavender-deep));
    color: #ffffff;
    box-shadow: 0 4px 14px rgba(155, 127, 212, 0.35);
    position: fixed;
    z-index: 20;
  }

  #btn-yes.roaming {
    transition: top 0.32s cubic-bezier(0.34, 1.56, 0.64, 1),
                left 0.32s cubic-bezier(0.34, 1.56, 0.64, 1),
                transform 0.32s ease;
  }

  #btn-yes.hidden-gone {
    display: none;
  }

  .shard {
    position: fixed;
    background: linear-gradient(135deg, var(--lavender), var(--lavender-deep));
    border-radius: 4px;
    pointer-events: none;
    z-index: 25;
  }

  .hint {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: var(--ink-soft);
    letter-spacing: 1px;
    opacity: 0.6;
  }

  @media (prefers-reduced-motion: reduce) {
    #btn-yes.roaming {
      transition: none;
    }
  }
</style>
</head>
<body>

<div class="scene" id="scene">
  <div class="center-stage">
    <h1>Определись с подарком?</h1>
    <p class="subtitle" id="subtitle">Дарите утюг — вот <span class="iron-word">правильный</span> ответ</p>
    <div class="buttons" id="buttons-row">
      <button id="btn-no">Нет</button>
      <button id="btn-yes">Да</button>
    </div>
  </div>
  <div class="hint">попробуйте нажать «да»</div>
</div>

<script>
  const yesBtn = document.getElementById('btn-yes');
  const noBtn = document.getElementById('btn-no');
  const subtitle = document.getElementById('subtitle');
  const scene = document.getElementById('scene');

  let yesAlive = true;
  let yesPlacedAbsolutely = false;

  function placeYesAtRow() {
    // position #btn-yes exactly over its natural spot in the row initially
    const rect = yesBtn.getBoundingClientRect();
    yesBtn.style.top = rect.top + 'px';
    yesBtn.style.left = rect.left + 'px';
  }

  function teleportYes() {
    if (!yesAlive) return;
    yesBtn.classList.add('roaming');
    if (!yesPlacedAbsolutely) {
      placeYesAtRow();
      yesPlacedAbsolutely = true;
      // force reflow so the transition applies to the next change, not this one
      void yesBtn.offsetWidth;
    }

    const btnW = yesBtn.offsetWidth;
    const btnH = yesBtn.offsetHeight;
    const margin = 16;
    const maxX = window.innerWidth - btnW - margin;
    const maxY = window.innerHeight - btnH - margin;

    const newX = Math.random() * (maxX - margin) + margin;
    const newY = Math.random() * (maxY - margin) + margin;

    yesBtn.style.left = newX + 'px';
    yesBtn.style.top = newY + 'px';
  }

  // Dodge on hover/approach so it can't be clicked
  yesBtn.addEventListener('mouseenter', teleportYes);
  yesBtn.addEventListener('touchstart', function (e) {
    e.preventDefault();
    teleportYes();
  }, { passive: false });

  // Safety net: if a click somehow lands, still dodge instead of "activating"
  yesBtn.addEventListener('click', function (e) {
    e.preventDefault();
    teleportYes();
  });

  function shatterYesButton() {
    if (!yesAlive) return;
    yesAlive = false;

    const rect = yesBtn.getBoundingClientRect();
    const cols = 6;
    const rows = 3;
    const pieceW = rect.width / cols;
    const pieceH = rect.height / rows;

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const shard = document.createElement('div');
        shard.className = 'shard';
        shard.style.width = pieceW + 'px';
        shard.style.height = pieceH + 'px';
        shard.style.left = (rect.left + c * pieceW) + 'px';
        shard.style.top = (rect.top + r * pieceH) + 'px';
        shard.style.opacity = '1';
        document.body.appendChild(shard);

        const angle = Math.random() * Math.PI * 2;
        const distance = 80 + Math.random() * 180;
        const dx = Math.cos(angle) * distance;
        const dy = Math.sin(angle) * distance + 60; // slight gravity downward
        const rotate = (Math.random() - 0.5) * 720;

        shard.animate([
          { transform: 'translate(0px, 0px) rotate(0deg)', opacity: 1 },
          { transform: `translate(${dx}px, ${dy}px) rotate(${rotate}deg)`, opacity: 0 }
        ], {
          duration: 700 + Math.random() * 400,
          easing: 'cubic-bezier(0.4, 0, 0.2, 1)',
          fill: 'forwards'
        });

        setTimeout(() => shard.remove(), 1200);
      }
    }

    yesBtn.classList.add('hidden-gone');
  }

  noBtn.addEventListener('click', function () {
    subtitle.classList.add('show');
    shatterYesButton();
  });

  window.addEventListener('resize', function () {
    if (yesPlacedAbsolutely && yesAlive) {
      const btnW = yesBtn.offsetWidth;
      const btnH = yesBtn.offsetHeight;
      const maxX = window.innerWidth - btnW - 16;
      const maxY = window.innerHeight - btnH - 16;
      const curX = parseFloat(yesBtn.style.left) || 0;
      const curY = parseFloat(yesBtn.style.top) || 0;
      yesBtn.style.left = Math.min(curX, maxX) + 'px';
      yesBtn.style.top = Math.min(curY, maxY) + 'px';
    }
  });
</script>

</body>
</html>
